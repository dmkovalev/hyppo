dependencies = [
    { name = "alembic" },
    { name = "asyncpg" },
    { name = "sqlalchemy" },
]

[package.metadata]
requires-dist = [
    { name = "aiosqlite", marker = "extra == 'dev'", specifier = ">=0.20.0" },
    { name = "alembic", specifier = ">=1.14.0,<2" },
    { name = "asyncpg", specifier = ">=0.30.0,<1" },
    { name = "coverage", extras = ["toml"], marker = "extra == 'dev'", specifier = ">=7.0" },
    { name = "faker", marker = "extra == 'dev'", specifier = ">=24.0.0" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8.0.0" },
    { name = "pytest-asyncio", marker = "extra == 'dev'", specifier = ">=0.23.0" },
    { name = "pytest-cov", marker = "extra == 'dev'", specifier = ">=6.0" },
    { name = "sqlalchemy", specifier = ">=2.0.30,<3" },
    { name = "testcontainers", extras = ["postgres"], marker = "extra == 'dev'", specifier = ">=4.8.0" },
]
provides-extras = ["dev"]
