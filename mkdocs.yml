site_name: gedanken
site_description: A platform for virtual (thought) experiments over hypothesis lattices
repo_url: https://github.com/dmkovalev/hyppo-ref
repo_name: dmkovalev/hyppo-ref

docs_dir: docs
exclude_docs: |
  specs/
  superpowers/

theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# Plugin order matters: i18n must run before mkdocstrings so that the
# localized (suffix-based) file set and nav are resolved first; mkdocstrings
# then generates API pages against that already-i18n-aware file/nav state.
# See https://ultrabug.github.io/mkdocs-static-i18n/ (plugin ordering).
plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: ru
          name: Русский
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Главная: Home
            Архитектура: Architecture
            Справочник API: API Reference
            Ядро: Core
            Конструктор решётки: Lattice Constructor
            Планировщик: Planner
            Исполнитель: Runner
            Менеджер: Manager
            Хранилище: Storage
            Версионирование: Versioning
            Сравнение: Comparison
            Онтология: Ontology
            Действия: Actions
            Адаптеры: Adapters
            Репозиторий метаданных: Metadata Repository
            Генератор: Generator
            Спецификация GUI-демо: GUI Demo Spec
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            docstring_options:
              warn_missing_types: false
            show_source: false
            show_root_heading: true
            merge_init_into_class: true
            filters: ["!^_"]

nav:
  - Главная: index.md
  - Архитектура: architecture.md
  - Справочник API:
      - Ядро: api/core.md
      - COA: api/coa.md
      - Конструктор решётки: api/lattice_constructor.md
      - Планировщик: api/planner.md
      - Исполнитель: api/runner.md
      - Менеджер: api/manager.md
      - Хранилище: api/storage.md
      - Версионирование: api/versioning.md
      - Сравнение: api/comparison.md
      - Онтология: api/ontology.md
      - Действия: api/actions.md
      - Адаптеры: api/adapters.md
      - GUI: api/gui.md
      - MCP: api/mcp.md
      - Репозиторий метаданных: api/metadata_repository.md
      - Генератор: api/generator.md
  - Спецификация GUI-демо: gui_demo_spec.md
